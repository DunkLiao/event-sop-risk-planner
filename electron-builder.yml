appId: com.event-sop-risk-planner
productName: 活動 SOP 與風險規劃生成器
directories:
  buildResources: build
  output: release
files:
  - 'dist/**/*'
  - 'dist-electron/**/*'
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!templates/*'
  - '!**/*.md'
  - '!**/*.map'
  - '!**/*.lock'
  - '!.ai-test-dist/**'
  - '!.storage-test-dist/**'
  - '!{.eslintignore,.eslintrc.json,.prettierrc,.gitignore}'
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
