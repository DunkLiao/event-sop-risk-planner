appId: com.event-sop-risk-planner
productName: 活動 SOP 與風險規劃生成器
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!*.{md,json,lock}'
  - '!{.eslintignore,.eslintrc.json,.prettierrc,.gitignore}'
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
